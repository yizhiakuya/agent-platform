server {
    listen 80;
    server_name _;

    # SPA shell — fall back to index.html for client-side routes
    location / {
        root /usr/share/nginx/web-dist/current;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # REST + SSE — must NOT buffer or compress, otherwise EventSource never receives chunks
    location /api/ {
        proxy_pass http://gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 600s;
    }

    # Internal endpoints must never be exposed to public clients
    location /internal/ { return 404; }

    # WebSocket upgrade for /ws/device/**
    location /ws/ {
        proxy_pass http://gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}

# Agent Platform — full self-host stack.
#
# Quick start:
#   1. cp .env.example .env       (and edit JWT_SECRET, ANTHROPIC_API_KEY, ...)
#   2. docker compose up -d
#   3. open http://localhost:3000
#
# Two profiles available:
#   - default:    everything (infra + 5 spring services + web)
#   - dev:        only postgres+nacos (use spring-boot:run from your IDE for code reload)

name: agent-platform

services:

  # ───────────────────────── infrastructure ─────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    container_name: agent-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agent_platform
      POSTGRES_USER: ${POSTGRES_USER:-agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD:-auth_changeme}
      CHAT_DB_PASSWORD: ${CHAT_DB_PASSWORD:-chat_changeme}
      HUB_DB_PASSWORD: ${HUB_DB_PASSWORD:-hub_changeme}
    ports:
      - "${POSTGRES_BIND:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nacos:
    image: nacos/nacos-server:v2.5.0
    container_name: agent-platform-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "${NACOS_AUTH_ENABLE:-false}"
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY:-serverIdentity}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE}
      JVM_XMS: 512m
      JVM_XMX: 512m
      JVM_XMN: 256m
    ports:
      - "${NACOS_BIND:-127.0.0.1}:${NACOS_PORT:-8848}:8848"
      - "${NACOS_BIND:-127.0.0.1}:${NACOS_GRPC_PORT:-9848}:9848"
    volumes:
      - nacos-data:/home/nacos/data
      - nacos-logs:/home/nacos/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8848/nacos/v1/console/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  photo-embedding-sidecar:
    profiles: ["photo-local"]
    build:
      context: .
      dockerfile: photo-embedding-sidecar/Dockerfile
    container_name: agent-platform-photo-embed
    restart: unless-stopped
    environment:
      PHOTO_EMBEDDING_MODEL: ${PHOTO_LOCAL_EMBEDDING_MODEL:-clip-ViT-B-32-multilingual-v1}
      PHOTO_EMBEDDING_TEXT_MODEL: ${PHOTO_LOCAL_TEXT_MODEL:-sentence-transformers/clip-ViT-B-32-multilingual-v1}
      PHOTO_EMBEDDING_IMAGE_MODEL: ${PHOTO_LOCAL_IMAGE_MODEL:-sentence-transformers/clip-ViT-B-32}
      PHOTO_EMBEDDING_DIM: ${PHOTO_EMBEDDING_DIM:-1024}
      PHOTO_EMBEDDING_DEVICE: ${PHOTO_LOCAL_EMBEDDING_DEVICE:-cpu}
    volumes:
      - photo-embedding-models:/models
    expose: ["8000"]

  # ───────────────────────── application services ─────────────────────────

  auth-service:
    profiles: ["default"]
    build:
      context: .
      dockerfile: Dockerfile.spring
      args:
        SERVICE: auth-service
    container_name: agent-platform-auth
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      nacos:    { condition: service_healthy }
    environment:
      SERVER_PORT: 8081
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: agent_platform
      AUTH_DB_USER: agent_auth
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD}
      NACOS_ADDR: nacos:8848
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-${JWT_SECRET}}
      SERVER_PUBLIC_URL: ${SERVER_PUBLIC_URL:-http://localhost:8080}
    expose: ["8081"]

  gateway:
    profiles: ["default"]
    build:
      context: .
      dockerfile: Dockerfile.spring
      args:
        SERVICE: gateway
    container_name: agent-platform-gateway
    restart: unless-stopped
    depends_on:
      nacos: { condition: service_healthy }
    environment:
      SERVER_PORT: 8080
      NACOS_ADDR: nacos:8848
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-${JWT_SECRET}}
      WEB_PUBLIC_URL: ${WEB_PUBLIC_URL:-http://localhost:3000}
    ports:
      - "${GATEWAY_PORT:-8080}:8080"

  device-hub-service:
    profiles: ["default"]
    build:
      context: .
      dockerfile: Dockerfile.spring
      args:
        SERVICE: device-hub-service
    container_name: agent-platform-hub
    restart: unless-stopped
    depends_on:
      nacos: { condition: service_healthy }
    environment:
      SERVER_PORT: 8083
      NACOS_ADDR: nacos:8848
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-${JWT_SECRET}}
      # Default false — see device-hub application.yaml comment.
      HUB_MOCK_MODE: ${HUB_MOCK_MODE:-false}
      HUB_WS_ALLOWED_ORIGINS: ${HUB_WS_ALLOWED_ORIGINS:-${WEB_PUBLIC_URL:-http://localhost:3000}}
    expose: ["8083"]
    volumes:
      - photo-upload-data:/data/agent-platform/uploads/photos

  agent-service:
    profiles: ["default"]
    build:
      context: .
      dockerfile: Dockerfile.spring
      args:
        SERVICE: agent-service
    container_name: agent-platform-agent
    restart: unless-stopped
    depends_on:
      nacos: { condition: service_healthy }
    environment:
      SERVER_PORT: 8082
      NACOS_ADDR: nacos:8848
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-${JWT_SECRET}}
      # Keep agent-service off host/Docker HTTP proxy settings.
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""
      NO_PROXY: "*"
      http_proxy: ""
      https_proxy: ""
      all_proxy: ""
      no_proxy: "*"
      JAVA_TOOL_OPTIONS: "-Djava.net.useSystemProxies=false"
      # Codex provider through an OpenAI-compatible Responses API relay.
      # Leave CODEX_API_KEY blank to skip this provider and use Anthropic below.
      CODEX_API_KEY: ${CODEX_API_KEY:-${OPENAI_API_KEY:-}}
      CODEX_BASE_URL: ${CODEX_BASE_URL:-https://subapi.rainaki.top}
      CODEX_CHAT_MODEL: ${CODEX_CHAT_MODEL:-gpt-5.5}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # Override to point at sub2api (cc.rainaki.top) or any Anthropic-compatible relay.
      # Default https://api.anthropic.com when this env var isn't set.
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      LLM_CHAT_MODEL: ${LLM_CHAT_MODEL:-claude-sonnet-4-6}
      # Dedicated embedding provider (memory recall + fact storage). Required
      # when ANTHROPIC_BASE_URL points at an anthropic-only relay like sub2api,
      # which has no /v1/embeddings. Leave blank to fall back to providers[0].
      MEMORY_EMBEDDING_BASE_URL: ${MEMORY_EMBEDDING_BASE_URL:-}
      MEMORY_EMBEDDING_API_KEY: ${MEMORY_EMBEDDING_API_KEY:-}
      MEMORY_EMBEDDING_MODEL: ${MEMORY_EMBEDDING_MODEL:-jina-embeddings-v3}
      MEMORY_EMBEDDING_DIM: ${MEMORY_EMBEDDING_DIM:-1024}
      MEMORY_EMBEDDING_TASK: ${MEMORY_EMBEDDING_TASK:-retrieval.passage}
      PHOTO_INDEX_ENABLED: ${PHOTO_INDEX_ENABLED:-true}
      PHOTO_INDEX_FALLBACK_REALTIME: ${PHOTO_INDEX_FALLBACK_REALTIME:-true}
      PHOTO_EMBEDDING_BASE_URL: ${PHOTO_EMBEDDING_BASE_URL:-${MEMORY_EMBEDDING_BASE_URL:-}}
      PHOTO_EMBEDDING_API_KEY: ${PHOTO_EMBEDDING_API_KEY:-${MEMORY_EMBEDDING_API_KEY:-}}
      PHOTO_EMBEDDING_MODEL: ${PHOTO_EMBEDDING_MODEL:-clip-ViT-B-32-multilingual-v1}
      PHOTO_EMBEDDING_DIM: ${PHOTO_EMBEDDING_DIM:-1024}
      PHOTO_EMBEDDING_TEXT_TASK: ${PHOTO_EMBEDDING_TEXT_TASK:-}
      PHOTO_EMBEDDING_IMAGE_TASK: ${PHOTO_EMBEDDING_IMAGE_TASK:-}
      PHOTO_EMBEDDING_IMAGE_FIELD: ${PHOTO_EMBEDDING_IMAGE_FIELD:-image}
      PHOTO_SEARCH_TOP_K: ${PHOTO_SEARCH_TOP_K:-8}
      PHOTO_SEARCH_MIN_SCORE: ${PHOTO_SEARCH_MIN_SCORE:-0.20}
      PHOTO_INDEX_BATCH_SIZE: ${PHOTO_INDEX_BATCH_SIZE:-8}
      PHOTO_EMBEDDING_TIMEOUT_SECONDS: ${PHOTO_EMBEDDING_TIMEOUT_SECONDS:-180}
    expose: ["8082"]

  chat-service:
    profiles: ["default"]
    build:
      context: .
      dockerfile: Dockerfile.spring
      args:
        SERVICE: chat-service
    container_name: agent-platform-chat
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      nacos:    { condition: service_healthy }
    environment:
      SERVER_PORT: 8084
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: agent_platform
      CHAT_DB_USER: agent_chat
      CHAT_DB_PASSWORD: ${CHAT_DB_PASSWORD}
      NACOS_ADDR: nacos:8848
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-${JWT_SECRET}}
    expose: ["8084"]

  web:
    profiles: ["default"]
    build:
      context: ./web
    container_name: agent-platform-web
    restart: unless-stopped
    depends_on:
      - gateway
    ports:
      - "${WEB_PORT:-3000}:80"

  caddy:
    profiles: ["default"]
    image: caddy:2-alpine
    container_name: agent-platform-caddy
    restart: unless-stopped
    depends_on:
      - web
      - gateway
      - device-hub-service
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./infra/caddy/certs:/etc/caddy/certs:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  nacos-data:
  nacos-logs:
  caddy-data:
  caddy-config:
  photo-embedding-models:
  photo-upload-data:

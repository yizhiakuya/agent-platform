server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: gateway
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        register-enabled: ${NACOS_REGISTER:true}
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false           # routes are explicit, not auto-derived from service names
          routes:
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/api/auth/**,/api/me/**
            - id: device-hub-ws
              uri: lb:ws://device-hub-service
              predicates:
                - Path=/ws/device/**
            - id: device-hub-rest
              uri: lb://device-hub-service
              predicates:
                - Path=/api/uploads/**
            - id: agent-service
              uri: lb://agent-service
              predicates:
                - Path=/api/chat/**
            - id: chat-service
              uri: lb://chat-service
              predicates:
                - Path=/api/sessions/**,/api/photos/**
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - ${WEB_PUBLIC_URL:http://localhost:3000}
                  - http://localhost:5173
                allowedMethods: ['GET','POST','PUT','DELETE','OPTIONS','PATCH']
                allowedHeaders: ['*']
                allowCredentials: true
                maxAge: 3600

agent-platform:
  internal:
    token: ${INTERNAL_API_TOKEN:${JWT_SECRET}}
  jwt:
    secret: ${JWT_SECRET:?JWT_SECRET must be set (base64-encoded, >= 32 raw bytes)}
    issuer: agent-platform
  # Path prefixes that require a valid user/device JWT. Anything outside this
  # list is forwarded as anonymous (e.g. /api/auth/** for login & enrollment redeem).
  protected-paths:
    - /api/me
    - /api/chat
    - /api/sessions
    - /api/photos
    - /api/uploads

logging:
  level:
    root: INFO
    com.agentplatform: DEBUG
    org.springframework.cloud.gateway: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
